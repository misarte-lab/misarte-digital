<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#17100a">
  <title>Cervejaria Inconfidentes | MisArte Digital</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <button id="homeBtn" class="brand" aria-label="Voltar ao início">
      <span class="brand-small">Cervejaria</span>
      <span class="brand-large">Inconfidentes</span>
    </button>
    <button id="menuBtn" class="icon-btn" aria-label="Abrir menu">☰</button>
  </header>

  <main id="app">
    <section id="homeView" class="home-view">
      <div class="hero-card">
        <img src="pages/pagina-01.webp" alt="Capa do catálogo da Cervejaria Inconfidentes">
      </div>
      <div class="brand-grid" id="brandGrid"></div>
    </section>

    <section id="readerView" class="reader-view" hidden>
      <div class="reader-stage">
        <img id="pageImage" alt="">
      </div>
    </section>
  </main>

  <nav id="bottomNav" class="bottom-nav" hidden>
    <button id="brandsBtn">⌂<span>Marcas</span></button>
    <button id="prevBtn">‹<span>Anterior</span></button>
    <button id="labelsBtn">☰<span>Rótulos</span></button>
    <button id="nextBtn">›<span>Próxima</span></button>
  </nav>

  <div id="drawerBackdrop" class="drawer-backdrop" hidden></div>
  <aside id="drawer" class="drawer" aria-hidden="true">
    <div class="drawer-head">
      <div>
        <strong id="drawerTitle">Rótulos</strong>
        <small>Toque para abrir</small>
      </div>
      <button id="closeDrawer" class="icon-btn" aria-label="Fechar menu">×</button>
    </div>
    <div id="drawerContent" class="drawer-content"></div>
  </aside>

  <script src="app.js"></script>
</body>
</html>
