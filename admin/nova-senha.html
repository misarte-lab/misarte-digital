<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#07140f">
  <meta name="robots" content="noindex,nofollow">
  <title>Nova senha | MisArte Digital</title>
  <link rel="stylesheet" href="./css/admin.css?v=1.1.0">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="brand-lockup">
        <img src="./assets/misarte-monograma.png" alt="MisArte Digital">
        <div>
          <span>MisArte Digital</span>
          <small>Plataforma Administrativa</small>
        </div>
      </div>

      <div class="auth-heading">
        <p class="eyebrow">RECUPERAÇÃO DE ACESSO</p>
        <h1>Crie sua nova senha.</h1>
        <p id="recoveryIntro">Validando o seu link...</p>
      </div>

      <form id="newPasswordForm" class="auth-form" novalidate hidden>
        <label for="newPassword">Nova senha</label>
        <input id="newPassword" type="password" autocomplete="new-password" minlength="8" required>

        <label for="confirmPassword">Confirme a nova senha</label>
        <input id="confirmPassword" type="password" autocomplete="new-password" minlength="8" required>

        <button id="savePasswordButton" class="button button-primary" type="submit">
          <span>Salvar nova senha</span>
        </button>
      </form>

      <div id="invalidRecovery" class="recovery-box" hidden>
        <p>Este link é inválido ou expirou.</p>
        <a class="button button-secondary" href="./login.html">Voltar ao login</a>
      </div>

      <p id="passwordMessage" class="form-message" role="status" aria-live="polite"></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/supabase.js?v=1.0.0"></script>
  <script src="./js/nova-senha.js?v=1.1.0"></script>
</body>
</html>
