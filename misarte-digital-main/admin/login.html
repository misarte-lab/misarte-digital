<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#07140f">
  <meta name="robots" content="noindex,nofollow">
  <title>Login | MisArte Digital</title>
  <link rel="stylesheet" href="./css/admin.css?v=1.0.0">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card" aria-labelledby="pageTitle">
      <div class="brand-lockup">
        <img src="./assets/misarte-monograma.png" alt="MisArte Digital">
        <div>
          <span>MisArte Digital</span>
          <small>Plataforma Administrativa</small>
        </div>
      </div>

      <div class="auth-heading">
        <p class="eyebrow">ACESSO RESTRITO</p>
        <h1 id="pageTitle">Bem-vinda, Mis.</h1>
        <p>Entre para gerenciar seus projetos e clientes.</p>
      </div>

      <form id="loginForm" class="auth-form" novalidate>
        <label for="email">E-mail</label>
        <input
          id="email"
          name="email"
          type="email"
          inputmode="email"
          autocomplete="username"
          placeholder="miscristiane@gmail.com"
          required
        >

        <label for="password">Senha</label>
        <div class="password-field">
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            placeholder="Digite sua senha"
            minlength="6"
            required
          >
          <button id="togglePassword" class="password-toggle" type="button" aria-label="Mostrar senha">
            Mostrar
          </button>
        </div>

        <button id="loginButton" class="button button-primary" type="submit">
          <span>Entrar</span>
        </button>

        <button id="forgotPasswordButton" class="text-button" type="button">
          Esqueci minha senha
        </button>

        <p id="loginMessage" class="form-message" role="status" aria-live="polite"></p>
      </form>

      <p class="auth-footer">Ambiente protegido pela MisArte Digital.</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/supabase.js?v=1.0.0"></script>
  <script src="./js/auth.js?v=1.1.0"></script>
</body>
</html>
